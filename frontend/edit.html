<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="style.css">

    <script src="script.js"></script>
</head>

<body onload="load()">
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstudent.html">Add Student</a>
        <a href="viewstudents.html"> View Students</a>
        <a href="logout.html">Logout</a>
    </nav>
    <br>

    <div class="form">
        <form onsubmit="edit(event)">
            <h3>Edit student</h3>

            <label for="name">Name:</label>
            <input type="text" name="name" id="editname" placeholder="Enter student name" required>
            <input type="text" name="id" id="editid" placeholder="Enter student ID" required hidden>
            <br>

            <label for="cgpa">CGPA:</label>
            <input type="text" name="cgpa" id="editcgpa" placeholder="Enter student CGPA" required>
            <br>

            <label for="branch">Branch:</label>
            <input type="text" name="branch" id="editbranch" placeholder="Enter student branch" required>
            <br>

            <button type="submit">Update</button>
        </form>
    </div>


</body>

</html>
